<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司洗钱风险评估</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; }

/* 顶栏 */
.header { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); color: #fff; padding: 0 32px; display: flex; align-items: center; gap: 20px; height: 56px; }
.header a { color: #7eb8da; text-decoration: none; font-size: 0.82rem; }
.header h1 { font-size: 1.3rem; font-weight: 600; }
.header select { padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 0.82rem; cursor: pointer; }
.header select option { color: #333; background: #fff; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* 按钮 */
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #1a1f3a; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #2a3050; }
.btn-outline { background: #fff; color: #1a1f3a; border: 1px solid #d9d9d9; }
.btn-outline:hover { border-color: #1a1f3a; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 操作栏 */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.assess-meta { color: #999; font-size: 0.8rem; margin-left: auto; }

/* 概览区：三列 */
.overview { display: grid; grid-template-columns: 280px 1fr 260px; gap: 20px; margin-bottom: 20px; }
.panel { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.panel h3 { font-size: 0.95rem; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #e8e8e8; }

/* 综合评分 */
.score-panel { padding: 28px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-panel .score-label { font-size: 0.85rem; color: #888; margin-bottom: 8px; font-weight: 600; }
.score-panel .big-score { font-size: 5rem; font-weight: 700; line-height: 1; transition: color 0.5s; }
.score-panel .risk-badge { font-size: 0.95rem; font-weight: 700; padding: 4px 18px; border-radius: 14px; margin: 10px 0 14px; display: inline-block; }
.score-panel .score-bar { width: 80%; height: 6px; border-radius: 3px; background: #f0f0f0; overflow: hidden; margin-bottom: 6px; }
.score-panel .score-bar .fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.score-panel .score-max { font-size: 0.72rem; color: #bbb; }
.score-panel .score-change { font-size: 0.82rem; font-weight: 600; margin-top: 10px; }
.score-panel .score-date { font-size: 0.72rem; color: #bbb; margin-top: 4px; }

/* 颜色 */
.level-low { color: #52c41a; } .level-mid { color: #faad14; } .level-high { color: #e74c3c; }
.badge-low { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.badge-mid  { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
.badge-high { background: #fff2f0; color: #e74c3c; border: 1px solid #ffa39e; }
.bar-low { background: #52c41a; } .bar-mid { background: #faad14; } .bar-high { background: #e74c3c; }

/* 雷达 */
.radar-panel { padding: 16px 12px; }
.radar-panel h3 { font-size: 0.9rem; color: #555; padding-left: 12px; margin-bottom: 0; }
#radarChart { width: 100%; height: 320px; }

/* 关键发现 */
.findings-panel { padding: 20px; }
.findings-panel h3 { font-size: 0.9rem; color: #555; margin-bottom: 16px; }
.finding-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.finding-item:last-child { border-bottom: none; }
.finding-count { font-size: 1.6rem; font-weight: 700; min-width: 40px; text-align: center; }
.finding-label { font-size: 0.82rem; color: #888; }
.top-risk { margin-top: 16px; padding: 12px; background: #fff2f0; border-radius: 8px; font-size: 0.82rem; color: #cf1322; line-height: 1.5; }

/* 数据概览条 */
.data-bar { display: flex; gap: 32px; justify-content: center; padding: 14px 24px; background: #fff; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.data-item { text-align: center; }
.data-item .dval { font-size: 1.3rem; font-weight: 700; color: #333; }
.data-item .dlbl { font-size: 0.72rem; color: #bbb; }

/* 维度卡片 */
.dim-section { background: #fff; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; transition: box-shadow 0.2s; }
.dim-section:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.dim-header { padding: 16px 24px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; border-left: 4px solid transparent; transition: border-color 0.2s; }
.dim-header .dnum { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: #fff; flex-shrink: 0; }
.dim-header .dtitle { font-size: 0.95rem; font-weight: 600; flex: 1; }
.dim-header .dbar-wrap { width: 100px; height: 6px; border-radius: 3px; background: #f0f0f0; overflow: hidden; }
.dim-header .dbar-wrap .fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.dim-header .dscore { text-align: right; min-width: 70px; }
.dim-header .dscore .dsval { font-size: 1.4rem; font-weight: 700; }
.dim-header .dscore .dslbl { font-size: 0.72rem; color: #999; }
.dim-header .dtoggle { font-size: 0.7rem; color: #bbb; transition: transform 0.2s; }
.dim-section.collapsed .dtoggle { transform: rotate(-90deg); }
.dim-section.collapsed .dim-body { display: none; }

.dim-body { padding: 8px 24px 20px; }
.dim-summary { font-size: 0.8rem; color: #999; margin-bottom: 10px; }
.assess-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.assess-table th { background: #fafafa; padding: 9px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; font-size: 0.8rem; }
.assess-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
.assess-table tr:last-child td { border-bottom: none; }
.risk-tag { font-weight: 700; font-size: 0.78rem; padding: 2px 10px; border-radius: 10px; display: inline-block; }
.risk-tag-high { background: #fff2f0; color: #e74c3c; }
.risk-tag-mid  { background: #fffbe6; color: #faad14; }
.risk-tag-low  { background: #f6ffed; color: #52c41a; }

.dim-recs { margin-top: 12px; padding-top: 10px; border-top: 1px solid #f5f5f5; }
.dim-recs .rectitle { font-size: 0.8rem; font-weight: 600; color: #888; margin-bottom: 6px; }
.dim-recs li { font-size: 0.82rem; color: #666; padding: 3px 0; margin-left: 16px; }

/* 整改建议汇总 */
.rec-panel { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.rec-panel h3 { font-size: 1rem; margin-bottom: 14px; }
.rec-list { list-style: none; }
.rec-list li { padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.86rem; display: flex; align-items: flex-start; gap: 8px; }
.rec-list li:last-child { border-bottom: none; }
.rec-dim-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.tag-cust { background: #e6f0ff; color: #4a90e2; }
.tag-prod { background: #fff3e6; color: #e67e22; }
.tag-chan { background: #f0ecff; color: #7b68ee; }
.tag-geo  { background: #e6f9f0; color: #2ecc71; }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 0.9rem; }

.footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.75rem; }

/* 导航栏 */
.nav-steps { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; margin-bottom: 20px; }
.nav-step { flex: 0 0 auto; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 700; text-decoration: none; transition: all 0.2s; white-space: nowrap; text-align: center; min-width: 140px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.nav-step.done { color: #389e0d; background: #f6ffed; border: 1px solid #b7eb8f; cursor: pointer; }
.nav-step.done:hover { background: #d9f7be; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
.nav-step.active { color: #fff; background: #1a1f3a; border: 1px solid #1a1f3a; box-shadow: 0 4px 12px rgba(26,31,58,0.3); }
.nav-step.ready { color: #333; background: #fff; border: 1px solid #d9d9d9; cursor: pointer; }
.nav-step.ready:hover { border-color: #4a90d9; color: #4a90d9; }
.nav-step.locked { color: #bbb; background: #fff; border: 1px solid #e8e8e8; pointer-events: none; }
.nav-connector { flex: 1; height: 0; border-top: 2px dashed #d9d9d9; min-width: 30px; margin: 0 4px; }
.nav-connector.done { border-color: #b7eb8f; border-style: solid; }

.filter-btn { padding: 5px 14px; border: 1px solid #d9d9d9; border-radius: 14px; background: #fff; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
.filter-btn:hover { border-color: #4a90d9; }
.filter-btn.active { background: #1a1f3a; color: #fff; border-color: #1a1f3a; }

/* 维度颜色 */
.color-cust { background: #4a90e2; } .bar-cust { background: #4a90e2; } .border-cust { border-left-color: #4a90e2 !important; }
.color-prod { background: #e67e22; } .bar-prod { background: #e67e22; } .border-prod { border-left-color: #e67e22 !important; }
.color-chan { background: #7b68ee; } .bar-chan { background: #7b68ee; } .border-chan { border-left-color: #7b68ee !important; }
.color-geo  { background: #2ecc71; } .bar-geo  { background: #2ecc71; } .border-geo  { border-left-color: #2ecc71 !important; }

@media (max-width: 900px) {
  .overview { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <a href="/">← 首页</a>
  <h1>公司洗钱风险评估</h1>
  <span style="flex:1"></span>
</div>

<div class="container">

  <!-- 导航栏 -->
  <div class="nav-steps" id="navSteps"></div>

  <!-- 操作栏 -->
  <div class="toolbar">
    <span style="font-size:0.85rem;color:#333;font-weight:600">选择模板</span>
    <select id="presetSelect" onchange="onPresetChange()" style="padding:8px 12px;border-radius:6px;border:1px solid #d9d9d9;font-size:0.85rem;background:#fff;cursor:pointer">
      <option value="preset_securities">基金模板</option>
      <option value="preset_bank">银行模板</option>
      <option value="preset_insurance">保险模板</option>
    </select>
    <button class="btn btn-primary" id="assessBtn" onclick="runAssess()">🔍 执行评估</button>
    <button class="btn" id="historyBtn" onclick="toggleHistory()" style="background:#fff;color:#1a1f3a;border:1px solid #d9d9d9">📈 评估历史</button>
    <span class="assess-meta" id="assessMeta"></span>
  </div>

  <!-- Dashboard 视图 -->
  <div id="dashboardView">

  <!-- 概览区 -->
  <div class="overview" id="overviewRow" style="display:none">
    <div class="panel score-panel" id="scorePanel"></div>
    <div class="panel radar-panel">
      <h3>四维风险雷达</h3>
      <div id="radarChart"></div>
    </div>
    <div class="panel findings-panel" id="findingsPanel"></div>
  </div>

  <!-- 数据概览条 -->
  <div class="data-bar" id="dataBar" style="display:none"></div>

  <!-- 初始化提示 -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔐</div>
    <div class="empty-text">选择评估模板，点击"执行评估"开始</div>
  </div>

  <!-- 四维度详情 -->
  <div id="dimSections"></div>

  <!-- 整改建议汇总 -->
  <div class="rec-panel" id="recPanel" style="display:none">
    <h3>🛡️ 整改建议汇总</h3>
    <ul class="rec-list" id="recList"></ul>
  </div>

  </div><!-- /dashboardView -->

  <!-- 评估历史视图 -->
  <div id="historyView" style="display:none">

    <!-- 对比分析 -->
    <div class="panel">
      <h3>⚖ 对比分析</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <span>评估A：</span><select id="compareA" style="padding:8px 12px;border-radius:6px;border:1px solid #d9d9d9;font-size:0.85rem;min-width:260px"></select>
        <span style="font-weight:700;color:#999">VS</span>
        <span>评估B：</span><select id="compareB" style="padding:8px 12px;border-radius:6px;border:1px solid #d9d9d9;font-size:0.85rem;min-width:260px"></select>
        <button class="btn btn-primary" onclick="runCompare()">对比</button>
      </div>
      <div id="compareResult"></div>
    </div>

    <!-- 评估记录 -->
    <div class="panel">
      <h3>📋 评估记录</h3>
      <div id="historyListContent"></div>
    </div>

    <!-- 趋势分析 -->
    <div class="panel">
      <h3>📈 趋势分析</h3>
      <div class="filter-bar" style="display:flex;gap:8px;margin-bottom:14px">
        <button class="filter-btn active" onclick="loadTrend(0)">全部</button>
        <button class="filter-btn" onclick="loadTrend(3)">3个月</button>
        <button class="filter-btn" onclick="loadTrend(6)">6个月</button>
        <button class="filter-btn" onclick="loadTrend(12)">12次</button>
      </div>
      <div id="trendChart" style="width:100%;height:400px"></div>
    </div>

  </div><!-- /historyView -->

</div>

<div class="footer">© 2026 金融合规智能平台</div>

<script>
let radarInst = null;
let lastResult = null;
let currentPreset = 'preset_securities';

// ── 动态导航 ──
async function renderNav(step) {
  const steps = [
    { num: 1, label: '数据导入', href: '/import/' },
    { num: 2, label: '评估指标', href: '/aml/items.html' },
    { num: 3, label: '执行评估', href: '/aml/' },
    { num: 4, label: '报告生成', href: '/report/' },
  ];

  // 查询数据库状态
  let hasData = false, hasHistory = false;
  try {
    const [sr, hr] = await Promise.all([
      fetch('/api/import/status'),
      fetch('/api/aml/history?limit=1'),
    ]);
    const sd = await sr.json();
    const hd = await hr.json();
    hasData = sd.status === 'ok' && Object.values(sd.counts || {}).some(c => c > 0);
    hasHistory = hd.status === 'ok' && (hd.history || []).length > 0;
  } catch(e) {}

  // 每步的解锁条件
  const canEnter = (n) => {
    if (n <= 2) return true;           // 导入+指标始终可进
    if (n === 3) return hasData;       // 执行评估需有数据
    if (n === 4) return hasHistory;    // 报告生成需有评估历史
    return false;
  };

  const isDone = (n) => {
    if (n === 1) return hasData;
    if (n === 2) return hasData;
    if (n === 3) return hasHistory;
    if (n === 4) return hasHistory && localStorage.getItem('report_done') === '1';
    return false;
  };

  let html = '';
  steps.forEach((s, i) => {
    if (i > 0) html += `<span class="nav-connector${isDone(s.num) ? ' done' : ''}"></span>`;
    let cls, icon;
    if (s.num === step) {
      cls = 'active'; icon = '●';
    } else if (canEnter(s.num)) {
      cls = isDone(s.num) ? 'done' : 'ready';
      icon = isDone(s.num) ? '✓' : '○';
    } else {
      cls = 'locked'; icon = '🔒';
    }
    const tag = cls === 'locked' ? 'span' : 'a';
    const href = cls !== 'locked' ? ` href="${s.href}"` : '';
    html += `<${tag} class="nav-step ${cls}"${href}>${icon} ${s.label}</${tag}>`;
  });
  document.getElementById('navSteps').innerHTML = html;
}

renderNav(3);
// 自动加载最近一次评估结果
(async function autoLoad() {
  try {
    const r = await fetch('/api/aml/history?limit=1');
    const d = await r.json();
    if (d.status === 'ok' && d.history.length > 0) {
      const latest = d.history[0];
      const rd = await (await fetch(`/api/aml/history/${latest.id}`)).json();
      if (rd.status === 'ok' && rd.record.dimensions) {
        const lv = {低:'低风险',中:'中风险',高:'高风险',最高:'最高风险'};
        lastResult = {
          status: 'ok', assessment_time: rd.record.assess_date,
          preset_id: rd.record.preset_id, overall_score: rd.record.overall_score,
          risk_level: rd.record.risk_level,
          risk_level_name: lv[rd.record.risk_level] || rd.record.risk_level,
          data_summary: rd.record.data_summary,
          dimensions: rd.record.dimensions,
          recommendations: rd.record.recommendations,
        };
        document.getElementById('presetSelect').value = rd.record.preset_id || 'preset_securities';
        currentPreset = rd.record.preset_id || 'preset_securities';
        renderAll(lastResult);
        document.getElementById('assessMeta').textContent = `上次评估: ${rd.record.assess_date}`;
      }
    }
  } catch(e) {}
})();

function onPresetChange() {
  currentPreset = document.getElementById('presetSelect').value;
}

async function runAssess() {
  const btn = document.getElementById('assessBtn');
  btn.disabled = true; btn.textContent = '⏳ 评估中...';

  try {
    const r = await fetch(`/api/aml/assess?preset_id=${currentPreset}`, { method: 'POST' });
    const d = await r.json();
    if (d.status !== 'ok') { alert('评估失败: ' + (d.message || '')); return; }
    lastResult = d;
    renderAll(d);
    renderNav(3);  // 评估完成后解锁报告生成
    document.getElementById('assessMeta').textContent = `评估时间: ${d.assessment_time}`;
  } catch(e) { alert('请求失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '🔍 执行评估'; }
}

function renderAll(d) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('overviewRow').style.display = 'grid';
  document.getElementById('dataBar').style.display = 'flex';
  document.getElementById('dimSections').style.display = 'block';
  document.getElementById('recPanel').style.display = 'block';

  const dims = d.dimensions;
  const dimKeys = ['customer','product','channel','geography'];
  const dimLabels = ['客户风险','产品/业务风险','渠道风险','地域风险'];
  const dimColors = ['color-cust','color-prod','color-chan','color-geo'];
  const dimBars = ['bar-cust','bar-prod','bar-chan','bar-geo'];
  const dimBorders = ['border-cust','border-prod','border-chan','border-geo'];

  // ── 综合评分 ──
  const cls = d.overall_score <= 30 ? 'level-low' : d.overall_score <= 60 ? 'level-mid' : 'level-high';
  const badge = d.overall_score <= 30 ? 'badge-low' : d.overall_score <= 60 ? 'badge-mid' : 'badge-high';
  const barCls = d.overall_score <= 30 ? 'bar-low' : d.overall_score <= 60 ? 'bar-mid' : 'bar-high';
  document.getElementById('scorePanel').innerHTML = `
    <div class="score-label">综合风险评分</div>
    <div class="big-score ${cls}" id="bigScore">0</div>
    <div class="risk-badge ${badge}">${d.risk_level_name}</div>
    <div class="score-bar"><div class="fill ${barCls}" id="scoreBar" style="width:0%"></div></div>
    <div class="score-max">${d.overall_score} / 100</div>
    <div class="score-change" id="scoreChange">—</div>
    <div class="score-date">${d.assessment_time}</div>
  `;
  // 数字滚动动画
  animateNumber('bigScore', 0, d.overall_score, 800);
  setTimeout(() => { document.getElementById('scoreBar').style.width = d.overall_score + '%'; }, 200);

  // ── 雷达图 ──
  if (!radarInst) radarInst = echarts.init(document.getElementById('radarChart'));
  radarInst.setOption({
    tooltip: { trigger: 'item' },
    radar: {
      center: ['50%', '55%'], radius: '60%',
      indicator: dimKeys.map((k, i) => ({
        name: dimLabels[i] + '\n' + dims[k].score + '分',
        max: 100,
      })),
      axisName: { color: '#333', fontSize: 13, fontWeight: 'bold' },
      splitArea: { areaStyle: { color: ['#fff','#fafafa','#fff','#fafafa','#fff'] } },
    },
    series: [{
      type: 'radar',
      data: [{ value: dimKeys.map(k => dims[k].score), name: '本次评估',
               areaStyle: { color: 'rgba(74,144,226,0.12)' },
               lineStyle: { color: '#4a90e2', width: 2 } }],
      symbol: 'circle', symbolSize: 6,
      itemStyle: { color: '#4a90e2' },
    }],
  }, true);

  // ── 关键发现 ──
  let allItems = [];
  dimKeys.forEach(k => { allItems = allItems.concat(dims[k].items); });
  const highCount = allItems.filter(i => i.risk === '高').length;
  const midCount = allItems.filter(i => i.risk === '中').length;
  const lowCount = allItems.filter(i => i.risk === '低').length;
  const topRisk = allItems.filter(i => i.risk === '高').slice(0, 1);
  document.getElementById('findingsPanel').innerHTML = `
    <h3>关键发现</h3>
    <div class="finding-item"><span class="finding-count" style="color:#e74c3c">${highCount}</span><span class="finding-label">项高风险</span></div>
    <div class="finding-item"><span class="finding-count" style="color:#faad14">${midCount}</span><span class="finding-label">项中风险</span></div>
    <div class="finding-item"><span class="finding-count" style="color:#52c41a">${lowCount}</span><span class="finding-label">项低风险</span></div>
    ${topRisk.length > 0 ? `<div class="top-risk">⚠ 最突出风险：<b>${topRisk[0].name}</b><br>${topRisk[0].remark}</div>` : '<div style="margin-top:16px;color:#52c41a;font-size:0.85rem">✅ 无高风险项</div>'}
  `;

  // ── 数据概览条 ──
  document.getElementById('dataBar').innerHTML = `
    <div class="data-item"><div class="dval">${d.data_summary.customers}</div><div class="dlbl">👤 客户</div></div>
    <div class="data-item"><div class="dval">${d.data_summary.accounts}</div><div class="dlbl">💳 账户</div></div>
    <div class="data-item"><div class="dval">${d.data_summary.transactions}</div><div class="dlbl">💸 交易</div></div>
    <div class="data-item"><div class="dval">${d.data_summary.products}</div><div class="dlbl">📦 产品</div></div>
  `;

  // ── 四维度卡片 ──
  document.getElementById('dimSections').innerHTML = dimKeys.map((k, i) => {
    const dim = dims[k];
    const dimCls = dim.score <= 30 ? 'level-low' : dim.score <= 60 ? 'level-mid' : 'level-high';
    return `
    <div class="dim-section ${dimBorders[i]}">
      <div class="dim-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="dnum ${dimColors[i]}">${i+1}</div>
        <div class="dtitle">${dimLabels[i]}</div>
        <div class="dbar-wrap"><div class="fill ${dimBars[i]}" style="width:0%" id="dimBar${i}"></div></div>
        <div class="dscore">
          <div class="dsval ${dimCls}" id="dimScore${i}">0</div>
          <div class="dslbl">分</div>
        </div>
        <span class="dtoggle">▼</span>
      </div>
      <div class="dim-body">
        <div class="dim-summary">${dim.summary}</div>
        <table class="assess-table">
          <thead><tr><th style="width:28%">评估项</th><th style="width:8%">风险</th><th style="width:30%">数据详情</th><th>说明</th></tr></thead>
          <tbody>
            ${dim.items.map(it => {
              const rcls = it.risk === '高' ? 'risk-tag-high' : it.risk === '中' ? 'risk-tag-mid' : 'risk-tag-low';
              return `<tr>
                <td><b>${it.name}</b></td>
                <td><span class="risk-tag ${rcls}">${it.risk}</span></td>
                <td style="font-size:0.82rem">${it.detail}</td>
                <td style="font-size:0.8rem;color:#888">${it.remark}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${dim.recommendations && dim.recommendations.length > 0 ? `
        <div class="dim-recs">
          <div class="rectitle">本维度建议</div>
          <ul>${dim.recommendations.map(r => `<li>${r}</li>`).join('')}</ul>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  // 维度分数和进度条动画
  setTimeout(() => {
    dimKeys.forEach((k, i) => {
      animateNumber('dimScore' + i, 0, dims[k].score, 600);
      document.getElementById('dimBar' + i).style.width = dims[k].score + '%';
    });
  }, 300);

  // ── 整改建议汇总 ──
  const tagMap = { customer: 'tag-cust', product: 'tag-prod', channel: 'tag-chan', geography: 'tag-geo' };
  const dimNameMap = { customer: '客户', product: '产品', channel: '渠道', geography: '地域' };
  document.getElementById('recList').innerHTML = d.recommendations.map((rec, i) => {
    let tagCls = '', tagName = '';
    for (const dk of dimKeys) {
      if (dims[dk].recommendations && dims[dk].recommendations.includes(rec)) {
        tagCls = tagMap[dk]; tagName = dimNameMap[dk]; break;
      }
    }
    return `<li><span style="color:#1a1f3a;font-weight:700;min-width:22px">${i+1}.</span><span style="flex:1">${rec}</span>${tagName ? `<span class="rec-dim-tag ${tagCls}">${tagName}</span>` : ''}</li>`;
  }).join('');
}

// 数字滚动动画
function animateNumber(id, from, to, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(ts) {
    const progress = Math.min((ts - start) / duration, 1);
    const val = Math.round(from + (to - from) * progress);
    el.textContent = to % 1 === 0 ? val : val.toFixed ? val : val;
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = to % 1 === 0 ? Math.round(to) : to.toFixed(1);
  }
  requestAnimationFrame(step);
}

// ── 评估历史切换 ──
let showingHistory = false, trendChartInst = null, historyListData = [];
function toggleHistory() {
  showingHistory = !showingHistory;
  const db = document.getElementById('dashboardView');
  const hv = document.getElementById('historyView');
  const btn = document.getElementById('historyBtn');
  if (showingHistory) {
    db.style.display = 'none'; hv.style.display = 'block';
    btn.style.background = '#1a1f3a'; btn.style.color = '#fff'; btn.style.borderColor = '#1a1f3a';
    btn.textContent = '📈 评估历史 (点击返回)';
    loadHistoryView();
  } else {
    db.style.display = ''; hv.style.display = 'none';
    btn.style.background = '#fff'; btn.style.color = '#1a1f3a'; btn.style.borderColor = '#d9d9d9';
    btn.textContent = '📈 评估历史';
  }
}

async function loadHistoryView() {
  // 加载历史列表
  const r = await fetch('/api/aml/history?limit=50');
  const d = await r.json();
  historyListData = d.history || [];
  renderHistoryList();
  populateCompare();
  loadTrend(0);
}

function renderHistoryList() {
  const div = document.getElementById('historyListContent');
  if (historyListData.length === 0) {
    div.innerHTML = '<div style="text-align:center;color:#bbb;padding:30px">暂无评估记录</div>'; return;
  }
  const names = { preset_securities:'基金', preset_bank:'银行', preset_insurance:'保险' };
  let h = '<table class="history-table" style="width:100%;border-collapse:collapse;font-size:0.84rem"><thead><tr style="background:#fafafa"><th style="padding:10px 14px;text-align:left">日期</th><th>模板</th><th>评分</th><th>等级</th><th>客户</th><th>交易</th></tr></thead><tbody>';
  historyListData.forEach((r, i) => {
    const tag = r.risk_level === '高' ? 'tag-high' : r.risk_level === '中' ? 'tag-mid' : 'tag-low';
    h += `<tr onclick="toggleHistoryDetail(${i},this)" style="cursor:pointer;border-bottom:1px solid #f0f0f0"><td style="padding:9px 14px">${r.assess_date}</td><td>${names[r.preset_id]||r.preset_id}</td><td style="font-weight:700">${r.overall_score}</td><td><span class="risk-tag ${tag}" style="font-size:0.75rem;padding:2px 8px;border-radius:8px">${r.risk_level}</span></td><td>${r.customer_count}</td><td>${r.trans_count}</td></tr>`;
    h += `<tr id="hdetail-${i}" style="display:none"><td colspan="6" style="padding:0 14px 12px;background:#f6f8ff"><div id="hdetail-grid-${i}" class="detail-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"></div></td></tr>`;
  });
  h += '</tbody></table>';
  div.innerHTML = h;
}

async function toggleHistoryDetail(i, tr) {
  const dr = document.getElementById('hdetail-' + i);
  if (dr.style.display !== 'none') { dr.style.display = 'none'; tr.classList.remove('expanded'); return; }
  const h = historyListData[i];
  const r = await fetch(`/api/aml/history/${h.id}`); const d = await r.json();
  if (d.status !== 'ok') return;
  const rec = d.record;
  const colors = ['#4a90e2','#e67e22','#7b68ee','#2ecc71'];
  const dnames = ['客户风险','产品/业务风险','渠道风险','地域风险'];
  const dkeys = ['customer','product','channel','geography'];
  document.getElementById('hdetail-grid-' + i).innerHTML = dkeys.map((dk, j) => {
    const sc = rec.scores[dk] || 0;
    const cl = sc <= 30 ? '#52c41a' : sc <= 60 ? '#faad14' : '#e74c3c';
    const items = (rec.dimensions[dk] || {}).items || [];
    return `<div style="border:1px solid #e8e8e8;border-left:3px solid ${colors[j]};border-radius:8px;padding:12px"><div style="font-weight:700;font-size:0.82rem;margin-bottom:4px">${dnames[j]}</div><div style="font-size:1.3rem;font-weight:700;color:${cl}">${sc}</div><div style="font-size:0.75rem;color:#888;margin-top:4px">${items.slice(0,3).map(it => '· '+it.name+': '+it.risk).join('<br>')}</div></div>`;
  }).join('');
  dr.style.display = ''; tr.classList.add('expanded');
}

function populateCompare() {
  const h = historyListData.map(r => `<option value="${r.id}">#${r.id} — ${r.assess_date} (${r.overall_score}分 ${r.risk_level})</option>`).join('');
  document.getElementById('compareA').innerHTML = h;
  document.getElementById('compareB').innerHTML = h;
  if (historyListData.length >= 2) { document.getElementById('compareA').selectedIndex = 0; document.getElementById('compareB').selectedIndex = 1; }
}

async function runCompare() {
  const id1 = document.getElementById('compareA').value;
  const id2 = document.getElementById('compareB').value;
  if (!id1 || !id2) return;
  const r = await fetch(`/api/aml/compare?id1=${id1}&id2=${id2}`);
  const d = await r.json();
  if (d.status !== 'ok') { alert('对比失败'); return; }
  const dl = { overall:'综合评分', customer:'客户风险', product:'产品/业务风险', channel:'渠道风险', geography:'地域风险' };
  let h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">';
  h += `<div style="border:1px solid #e8e8e8;border-radius:10px;padding:16px;text-align:center"><div style="font-size:0.78rem;color:#999">${d.assessment_a.date}</div><div style="font-size:2.2rem;font-weight:700">${d.assessment_a.overall_score}</div><div>${d.assessment_a.risk_level}</div></div>`;
  h += `<div style="border:1px solid #e8e8e8;border-radius:10px;padding:16px;text-align:center"><div style="font-size:0.78rem;color:#999">${d.assessment_b.date}</div><div style="font-size:2.2rem;font-weight:700">${d.assessment_b.overall_score}</div><div>${d.assessment_b.risk_level}</div></div>`;
  h += '</div><div style="border-top:1px solid #f0f0f0;padding-top:12px"><b>维度变化</b><br>';
  for (const [k, lb] of Object.entries(dl)) {
    const df = d.comparison[k];
    const c = df.direction === 'up' ? '#e74c3c' : df.direction === 'down' ? '#52c41a' : '#999';
    h += `<div style="padding:5px 0"><span style="color:#888;font-size:0.85rem">${lb}</span> <span style="color:${c};font-weight:700">${df.label}</span></div>`;
  }
  h += '</div>';
  document.getElementById('compareResult').innerHTML = h;
}

function loadTrend(months) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  fetch(`/api/aml/history/trend?limit=${months || 50}`).then(r => r.json()).then(d => {
    const data = d.trend || [];
    if (!trendChartInst) trendChartInst = echarts.init(document.getElementById('trendChart'));
    if (data.length === 0) { trendChartInst.setOption({ title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#bbb' } } }); return; }
    trendChartInst.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['综合','客户','产品','渠道','地域'], bottom: 0 },
      grid: { left: 40, right: 20, top: 20, bottom: 40 },
      xAxis: { type: 'category', data: data.map(d => d.date.slice(0,10)), axisLabel: { rotate: 30, fontSize: 10 } },
      yAxis: { type: 'value', min: 0, max: 100 },
      series: [
        { name: '综合', type: 'line', data: data.map(d => d.overall), lineStyle: { width: 3, color: '#1a1f3a' }, itemStyle: { color: '#1a1f3a' }, symbol: 'circle', symbolSize: 5 },
        { name: '客户', type: 'line', data: data.map(d => d.customer), lineStyle: { color: '#4a90e2' }, itemStyle: { color: '#4a90e2' } },
        { name: '产品', type: 'line', data: data.map(d => d.product), lineStyle: { color: '#e67e22' }, itemStyle: { color: '#e67e22' } },
        { name: '渠道', type: 'line', data: data.map(d => d.channel), lineStyle: { color: '#7b68ee' }, itemStyle: { color: '#7b68ee' } },
        { name: '地域', type: 'line', data: data.map(d => d.geography), lineStyle: { color: '#2ecc71' }, itemStyle: { color: '#2ecc71' } },
      ],
    }, true);
  });
}
