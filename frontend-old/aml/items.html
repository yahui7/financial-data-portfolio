<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评估指标管理 — 金融合规智能平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); color: #fff; padding: 0 32px; display: flex; align-items: center; gap: 16px; height: 56px; }
.header a { color: #7eb8da; text-decoration: none; font-size: 0.82rem; }
.header h1 { font-size: 1.3rem; font-weight: 600; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* 导航栏 */
.nav-steps { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; margin-bottom: 20px; }
.nav-step { flex: 0 0 auto; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 700; text-decoration: none; transition: all 0.2s; white-space: nowrap; text-align: center; min-width: 140px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.nav-step.done { color: #389e0d; background: #f6ffed; border: 1px solid #b7eb8f; cursor: pointer; }
.nav-step.done:hover { background: #d9f7be; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
.nav-step.active { color: #fff; background: #1a1f3a; border: 1px solid #1a1f3a; box-shadow: 0 4px 12px rgba(26,31,58,0.3); }
.nav-step.ready { color: #333; background: #fff; border: 1px solid #d9d9d9; cursor: pointer; }
.nav-step.ready:hover { border-color: #4a90d9; color: #4a90d9; }
.nav-step.locked { color: #bbb; background: #fff; border: 1px solid #e8e8e8; pointer-events: none; }
.nav-connector { flex: 1; height: 0; border-top: 2px dashed #d9d9d9; min-width: 30px; margin: 0 4px; }
.nav-connector.done { border-color: #b7eb8f; border-style: solid; }

.panel { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.panel h3 { font-size: 0.95rem; margin-bottom: 14px; }
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.toolbar select { padding: 8px 12px; border-radius: 6px; border: 1px solid #d9d9d9; font-size: 0.85rem; }

/* 表格 */
.items-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.items-table th { background: #fafafa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; font-size: 0.8rem; }
.items-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
.items-table tr:hover td { background: #fafbff; }
.dim-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; display: inline-block; }
.dim-customer { background: #e6f0ff; color: #4a90e2; }
.dim-product  { background: #fff3e6; color: #e67e22; }
.dim-channel  { background: #f0ecff; color: #7b68ee; }
.dim-geo      { background: #e6f9f0; color: #2ecc71; }
.cat-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 8px; }
.cat-data { background: #e6f7ff; color: #1890ff; }
.cat-framework { background: #fff7e6; color: #d48806; }
.toggle-btn { padding: 4px 14px; border-radius: 12px; border: none; font-size: 0.78rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.toggle-on { background: #52c41a; color: #fff; }
.toggle-on:hover { background: #389e0d; }
.toggle-off { background: #fff2f0; color: #cf1322; border: 1px solid #ffa39e; }
.toggle-off:hover { background: #ffd8d2; }

.footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.75rem; }
</style>
</head>
<body>

<div class="header">
  <a href="/">← 首页</a>
  <h1>公司洗钱风险评估</h1>
  <span style="flex:1"></span>
</div>

<div class="container">

  <!-- 导航栏：当前在评估指标 -->
  <div class="nav-steps" id="navSteps"></div>

  <div class="panel">
    <div class="toolbar">
      <span style="font-size:0.85rem;color:#333;font-weight:600">选择模板</span>
      <select id="presetSelect" onchange="loadItems()">
        <option value="preset_securities">基金模板</option>
        <option value="preset_bank">银行模板</option>
        <option value="preset_insurance">保险模板</option>
      </select>
      <span style="flex:1"></span>
      <span id="itemCount" style="font-size:0.82rem;color:#999"></span>
    </div>

    <div style="overflow-x:auto">
      <table class="items-table">
        <thead><tr>
          <th>启用</th><th>指标状态</th><th>指标编号</th><th>维度</th><th>指标名称</th><th>类型</th><th>说明</th>
        </tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footer">© 2026 金融合规智能平台</div>

<script>
// ── 动态导航 ──
async function renderNav(step) {
  const steps = [
    { num: 1, label: '数据导入', href: '/import/' },
    { num: 2, label: '评估指标', href: '/aml/items.html' },
    { num: 3, label: '执行评估', href: '/aml/' },
    { num: 4, label: '报告生成', href: '/report/' },
  ];
  let hasData = false, hasHistory = false;
  try {
    const sd = await (await fetch('/api/import/status')).json();
    hasData = sd.status === 'ok' && Object.values(sd.counts || {}).some(c => c > 0);
  } catch(e) {}
  try {
    const hd = await (await fetch('/api/aml/history?limit=1')).json();
    hasHistory = hd.status === 'ok' && (hd.history || []).length > 0;
  } catch(e) {}
  const canEnter = (n) => {
    if (n <= 2) return true;
    if (n === 3) return hasData;
    if (n === 4) return hasHistory;
    return false;
  };
  const isDone = (n) => {
    if (n === 1) return hasData;
    if (n === 2) return hasData;
    if (n === 3) return hasHistory;
    if (n === 4) return hasHistory && localStorage.getItem('report_done') === '1';
    return false;
  };
  let html = '';
  steps.forEach((s, i) => {
    if (i > 0) html += `<span class="nav-connector${isDone(s.num) ? ' done' : ''}"></span>`;
    let cls, icon;
    if (s.num === step) { cls = 'active'; icon = '●'; }
    else if (canEnter(s.num)) { cls = isDone(s.num) ? 'done' : 'ready'; icon = isDone(s.num) ? '✓' : '○'; }
    else { cls = 'locked'; icon = '🔒'; }
    const tag = cls === 'locked' ? 'span' : 'a';
    const href = cls !== 'locked' ? ` href="${s.href}"` : '';
    html += `<${tag} class="nav-step ${cls}"${href}>${icon} ${s.label}</${tag}>`;
  });
  document.getElementById('navSteps').innerHTML = html;
}
renderNav(2);

const dimNames = { customer: '客户风险', product: '产品/业务风险', channel: '渠道风险', geography: '地域风险' };
const dimClass = { customer: 'dim-customer', product: 'dim-product', channel: 'dim-channel', geography: 'dim-geo' };

async function loadItems() {
  const preset = document.getElementById('presetSelect').value;
  const r = await fetch(`/api/aml/items?preset_id=${preset}`);
  const d = await r.json();
  const items = d.items || [];
  document.getElementById('itemCount').textContent = `共 ${items.length} 项`;

  const tbody = document.getElementById('itemsBody');
  // 生成指标编号 (cust-001, prod-001, ...)
  const counters = {};
  const codeMap = {};
  items.forEach(it => {
    const prefix = {customer:'cust',product:'prod',channel:'chan',geography:'geo'}[it.dimension] || 'oth';
    counters[prefix] = (counters[prefix] || 0) + 1;
    codeMap[it.item_key] = prefix + '-' + String(counters[prefix]).padStart(2, '0');
  });

  tbody.innerHTML = items.map(it => {
    const isOn = it.enabled === 1;
    const gray = isOn ? '' : 'opacity:0.45';
    return `
    <tr style="${gray}">
      <td><button class="toggle-btn ${isOn ? 'toggle-off' : 'toggle-on'}" onclick="toggleItem('${it.item_key}', ${it.enabled})">${isOn ? '禁用' : '启用'}</button></td>
      <td style="font-weight:600;${isOn ? 'color:#389e0d' : 'color:#bbb'}">${isOn ? '启用中' : '禁用中'}</td>
      <td style="font-family:monospace;font-size:0.82rem;color:#888">${codeMap[it.item_key]}</td>
      <td><span class="dim-tag ${dimClass[it.dimension] || ''}">${dimNames[it.dimension] || it.dimension}</span></td>
      <td><b>${it.name}</b></td>
      <td><span class="cat-tag ${it.category === 'data_driven' ? 'cat-data' : 'cat-framework'}">${it.category === 'data_driven' ? '数据驱动' : '框架评估'}</span></td>
      <td style="font-size:0.82rem;color:#666;max-width:320px">${it.description || ''}</td>
    </tr>`;
  }).join('');
}

async function toggleItem(itemKey, enabled) {
  await fetch(`/api/aml/items/${itemKey}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled: enabled ? 0 : 1 }),
  });
  loadItems();
}

loadItems();
</script>
</body>
</html>
