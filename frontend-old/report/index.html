<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告生成工具</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
    <h1>📊 报告生成工具</h1>
    <p class="subtitle">通用报告生成器 · 模板管理 · CSV导入 · Word导出 · 历史对比</p>
</header>

<nav class="tab-bar">
    <button class="tab-btn active" data-tab="templates">📋 模板管理</button>
    <button class="tab-btn" data-tab="generate">✏️ 生成报告</button>
    <button class="tab-btn" data-tab="history">📁 历史报告</button>
</nav>

<main class="app-main">
    <!-- 模板管理 -->
    <section class="tab-panel active" id="panel-templates">
        <div class="panel-header">
            <h2>模板管理</h2>
            <button class="btn btn-primary" id="btn-new-template">+ 新建模板</button>
        </div>
        <div id="templates-list" class="card-grid"></div>
    </section>

    <!-- 生成报告 -->
    <section class="tab-panel" id="panel-generate">
        <div class="panel-header">
            <h2>生成报告</h2>
        </div>
        <div class="stepper hidden" id="generate-stepper">
            <div class="stepper-step" data-step="1">
                <span class="stepper-num">1</span>
                <span class="stepper-label">选择模板</span>
            </div>
            <div class="stepper-line"></div>
            <div class="stepper-step" data-step="2">
                <span class="stepper-num">2</span>
                <span class="stepper-label">填写数据</span>
            </div>
            <div class="stepper-line"></div>
            <div class="stepper-step" data-step="3">
                <span class="stepper-num">3</span>
                <span class="stepper-label">预览调整</span>
            </div>
        </div>

        <div id="generate-content">
            <div id="step-select-tpl" class="step">
                <h3>第一步：选择报告模板</h3>
                <div id="tpl-select-list" class="card-grid"></div>
            </div>
            <div id="step-fill-data" class="step hidden">
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
                    <h3 style="margin:0;border:none;padding:0;">第二步：填写报告数据</h3>
                    <button class="btn btn-sm btn-outline" id="btn-back-to-select">← 返回重选模板</button>
                </div>
                <div class="input-mode-bar">
                    <button class="btn btn-outline active" id="btn-mode-form">📝 在线填写</button>
                    <button class="btn btn-outline" id="btn-mode-csv">📄 CSV 导入</button>
                </div>
                <div id="mode-form">
                    <div id="placeholder-form" class="form-area"></div>
                    <div class="form-row-inline">
                        <label>报告标题：</label>
                        <input type="text" id="report-title" class="input" placeholder="输入报告标题" />
                    </div>
                    <div class="form-row-inline">
                        <label>编制人：</label>
                        <input type="text" id="report-author" class="input" placeholder="编制人" />
                    </div>
                    <button class="btn btn-primary" id="btn-generate">🔍 生成预览</button>
                </div>
                <div id="mode-csv" class="hidden">
                    <div class="csv-actions">
                        <button class="btn btn-outline" id="btn-download-csv">⬇️ 下载 CSV 模板</button>
                        <div class="upload-area">
                            <input type="file" id="csv-file-input" accept=".csv" />
                            <label for="csv-file-input" class="btn btn-outline">📤 上传填好的 CSV</label>
                            <span id="csv-status"></span>
                        </div>
                    </div>
                    <div class="form-row-inline">
                        <label>报告标题：</label>
                        <input type="text" id="report-title-csv" class="input" placeholder="输入报告标题" />
                    </div>
                    <div class="form-row-inline">
                        <label>编制人：</label>
                        <input type="text" id="report-author-csv" class="input" placeholder="编制人" />
                    </div>
                    <button class="btn btn-primary" id="btn-generate-csv">🔍 生成预览</button>
                </div>
            </div>
            <div id="step-preview" class="step hidden">
                <h3>第三步：预览与调整</h3>
                <div id="preview-edit" class="preview-container"></div>
                <div class="preview-actions">
                    <button class="btn btn-outline" id="btn-back-edit">← 返回修改</button>
                    <button class="btn btn-success" id="btn-export-word">📥 下载 Word</button>
                    <button class="btn btn-primary" id="btn-save-history">💾 保存到历史</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 历史报告 -->
    <section class="tab-panel" id="panel-history">
        <div class="panel-header">
            <h2>历史报告</h2>
            <button class="btn btn-outline" id="btn-compare-mode">🔍 对比模式</button>
        </div>
        <div id="compare-bar" class="compare-bar hidden">
            <span>已选 <strong id="compare-count">0</strong>/2 份报告</span>
            <button class="btn btn-primary btn-sm" id="btn-do-compare" disabled>开始对比</button>
            <button class="btn btn-outline btn-sm" id="btn-cancel-compare">取消</button>
        </div>
        <div id="history-list" class="history-table-wrap"></div>
        <div id="history-preview" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="preview-title">报告预览</h3>
                    <button class="btn-close" id="btn-close-preview">✕</button>
                </div>
                <div class="modal-body" id="preview-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-success" id="btn-preview-export">📥 下载 Word</button>
                    <button class="btn btn-outline" id="btn-close-preview-bottom">关闭</button>
                </div>
            </div>
        </div>
        <div id="compare-preview" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content modal-wide">
                <div class="modal-header">
                    <h3>报告对比</h3>
                    <button class="btn-close" id="btn-close-compare">✕</button>
                </div>
                <div class="modal-body compare-body" id="compare-body"></div>
            </div>
        </div>
    </section>
</main>

<div id="tpl-editor-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-wide">
        <div class="modal-header">
            <h3 id="tpl-editor-title">编辑模板</h3>
            <button class="btn-close" id="btn-close-tpl-editor">✕</button>
        </div>
        <div class="modal-body" id="tpl-editor-body"></div>
        <div class="modal-footer" id="tpl-editor-footer"></div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/api.js"></script>
<script src="js/templates.js"></script>
<script src="js/generate.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
