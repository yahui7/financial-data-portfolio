<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据导入 — 金融合规智能平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }

.header { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 16px; height: 56px; }
.header a { color: #7eb8da; text-decoration: none; font-size: 0.85rem; }
.header h1 { font-size: 1.3rem; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* 步骤说明 */
.steps { display: flex; gap: 16px; margin-bottom: 24px; }
.step { flex: 1; background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
.step .snum { width: 28px; height: 28px; border-radius: 50%; background: #1a1f3a; color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; }
.step .stext { font-size: 0.85rem; color: #555; }

/* 模板下载区 */
.tmpl-section { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.tmpl-section h3 { font-size: 0.95rem; margin-bottom: 14px; }
.tmpl-btns { display: flex; gap: 10px; flex-wrap: wrap; }
.tmpl-btn { display: inline-block; padding: 8px 18px; border: 1px solid #d9d9d9; border-radius: 6px; text-decoration: none; color: #555; font-size: 0.85rem; transition: all 0.2s; }
.tmpl-btn:hover { border-color: #4a90d9; color: #4a90d9; }

/* 上传卡片 */
.upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.upload-card { background: #fff; border: 2px dashed #d9d9d9; border-radius: 10px; padding: 24px; text-align: center; transition: all 0.2s; cursor: pointer; position: relative; }
.upload-card:hover { border-color: #4a90d9; background: #fafbff; }
.upload-card.done { border-style: solid; border-color: #52c41a; background: #f6ffed; }
.upload-card.warn { border-style: solid; border-color: #faad14; background: #fffbe6; }
.upload-card.error { border-style: solid; border-color: #e74c3c; background: #fff2f0; }
.upload-card .uc-icon { font-size: 2rem; margin-bottom: 8px; }
.upload-card .uc-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
.upload-card .uc-hint { font-size: 0.78rem; color: #999; margin-bottom: 10px; }
.upload-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-card .uc-result { font-size: 0.8rem; margin-top: 8px; padding: 4px 10px; border-radius: 10px; display: none; }
.upload-card.done .uc-result { display: inline-block; background: #d9f7be; color: #389e0d; }
.upload-card.warn .uc-result { display: inline-block; background: #fffbe6; color: #d48806; }
.upload-card.error .uc-result { display: inline-block; background: #fff2f0; color: #e74c3c; }

/* 预览区 */
.preview-section { background: #fff; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; display: none; }
.preview-section.show { display: block; }
.preview-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; }
.preview-header h3 { font-size: 0.95rem; }
.preview-header .pstat { font-size: 0.8rem; padding: 3px 10px; border-radius: 10px; }
.preview-header .pstat.ok { background: #f6ffed; color: #52c41a; }
.preview-header .pstat.warn { background: #fff2f0; color: #e74c3c; }
.preview-table-wrap { overflow-x: auto; padding: 0 24px 16px; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.preview-table th { background: #fafafa; padding: 8px 10px; text-align: left; font-weight: 600; white-space: nowrap; border-bottom: 2px solid #e8e8e8; }
.preview-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.preview-table td.cell-error { background: #fff2f0; color: #e74c3c; }
.preview-table td.cell-warn { background: #fffbe6; color: #d48806; }

/* 错误列表 */
.error-list { padding: 0 24px 16px; display: none; }
.error-list.show { display: block; }
.error-item { font-size: 0.82rem; color: #e74c3c; padding: 4px 0; border-bottom: 1px solid #fff2f0; }

/* 操作按钮 */
.action-bar { text-align: center; margin-bottom: 24px; }
.btn { padding: 12px 32px; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #1a1f3a; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #2a3050; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-outline { background: #fff; color: #e74c3c; border: 1px solid #e74c3c; margin-left: 10px; }
.btn-outline:hover { background: #fff2f0; }

/* 质量检查结果 */
.quality-section { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: none; }
.quality-section.show { display: block; }
.score-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.score-card { border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px 12px; text-align: center; }
.score-card .slabel { font-size: 0.75rem; color: #999; margin-bottom: 6px; }
.score-card .svalue { font-size: 1.8rem; font-weight: 700; }
.score-card .sbar { height: 4px; border-radius: 2px; background: #f0f0f0; margin-top: 8px; overflow: hidden; }
.score-card .sbar .fill { height: 100%; border-radius: 2px; }

.footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.75rem; }

/* 导航栏 */
.nav-steps { display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; margin-bottom: 20px; }
.nav-step { flex: 0 0 auto; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 700; text-decoration: none; transition: all 0.2s; white-space: nowrap; text-align: center; min-width: 140px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.nav-step.done { color: #389e0d; background: #f6ffed; border: 1px solid #b7eb8f; cursor: pointer; }
.nav-step.done:hover { background: #d9f7be; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
.nav-step.active { color: #fff; background: #1a1f3a; border: 1px solid #1a1f3a; box-shadow: 0 4px 12px rgba(26,31,58,0.3); }
.nav-step.ready { color: #333; background: #fff; border: 1px solid #d9d9d9; cursor: pointer; }
.nav-step.ready:hover { border-color: #4a90d9; color: #4a90d9; }
.nav-step.locked { color: #bbb; background: #fff; border: 1px solid #e8e8e8; pointer-events: none; }
.nav-connector { flex: 1; height: 0; border-top: 2px dashed #d9d9d9; min-width: 30px; margin: 0 4px; }
.nav-connector.done { border-color: #b7eb8f; border-style: solid; }
</style>
</head>
<body>

<div class="header">
  <a href="/">← 首页</a>
  <h1>公司洗钱风险评估</h1>
  <span style="flex:1"></span>
</div>

<div class="container">

  <!-- 导航栏 -->
  <div class="nav-steps" id="navSteps"></div>

  <!-- 步骤说明 -->
  <div class="steps">
    <div class="step"><div class="snum">1</div><div class="stext">下载CSV模板</div></div>
    <div class="step"><div class="snum">2</div><div class="stext">预览并调整数据</div></div>
    <div class="step"><div class="snum">3</div><div class="stext">查看导入结果</div></div>
  </div>

  <!-- 模板下载 -->
  <div class="tmpl-section">
    <h3>📋 第一步：下载CSV模板</h3>
    <div class="tmpl-btns">
      <a href="/api/import/templates/customer" class="tmpl-btn" download>👤 客户表模板</a>
      <a href="/api/import/templates/account" class="tmpl-btn" download>💳 账户表模板</a>
      <a href="/api/import/templates/trans_record" class="tmpl-btn" download>💸 交易表模板</a>
      <a href="/api/import/templates/product" class="tmpl-btn" download>📦 产品表模板</a>
    </div>
  </div>

  <!-- 上传区 -->
  <div class="upload-grid" id="uploadGrid">
    <div class="upload-card" data-table="customer" onclick="switchPreview('customer')">
      <div class="uc-icon">👤</div>
      <div class="uc-title">客户表</div>
      <div class="uc-hint">点击上传 customer.csv</div>
      <input type="file" accept=".csv" onchange="handleFile(this, 'customer')" onclick="event.stopPropagation()">
      <div class="uc-result" id="result-customer"></div>
    </div>
    <div class="upload-card" data-table="account" onclick="switchPreview('account')">
      <div class="uc-icon">💳</div>
      <div class="uc-title">账户表</div>
      <div class="uc-hint">点击上传 account.csv</div>
      <input type="file" accept=".csv" onchange="handleFile(this, 'account')" onclick="event.stopPropagation()">
      <div class="uc-result" id="result-account"></div>
    </div>
    <div class="upload-card" data-table="trans_record" onclick="switchPreview('trans_record')">
      <div class="uc-icon">💸</div>
      <div class="uc-title">交易表</div>
      <div class="uc-hint">点击上传 trans_record.csv</div>
      <input type="file" accept=".csv" onchange="handleFile(this, 'trans_record')" onclick="event.stopPropagation()">
      <div class="uc-result" id="result-trans_record"></div>
    </div>
    <div class="upload-card" data-table="product" onclick="switchPreview('product')">
      <div class="uc-icon">📦</div>
      <div class="uc-title">产品表</div>
      <div class="uc-hint">点击上传 product.csv</div>
      <input type="file" accept=".csv" onchange="handleFile(this, 'product')" onclick="event.stopPropagation()">
      <div class="uc-result" id="result-product"></div>
    </div>
  </div>

  <!-- 预览区 -->
  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <h3 id="previewTitle">数据预览</h3>
      <span class="pstat" id="previewStat"></span>
    </div>
    <div class="error-list" id="errorList"></div>
    <div class="preview-table-wrap">
      <table class="preview-table" id="previewTable"><tbody></tbody></table>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="action-bar">
    <button class="btn btn-primary" id="confirmBtn" disabled onclick="confirmImport()">✅ 确认导入</button>
    <button class="btn btn-outline" onclick="clearData()">🗑 清空数据</button>
  </div>

  <!-- 导入结果 -->
  <div class="quality-section" id="importResultSection">
    <h3 style="margin-bottom:16px">📋 第三步：查看导入结果</h3>
    <div id="importResultContent"></div>
  </div>

</div>

<div class="footer">© 2026 金融合规智能平台</div>

<script>
// ── 动态导航 ──
async function renderNav(step) {
  const steps = [
    { num: 1, label: '数据导入', href: '/import/' },
    { num: 2, label: '评估指标', href: '/aml/items.html' },
    { num: 3, label: '执行评估', href: '/aml/' },
    { num: 4, label: '报告生成', href: '/report/' },
  ];
  let hasData = false, hasHistory = false;
  try {
    const [sr, hr] = await Promise.all([
      fetch('/api/import/status'),
      fetch('/api/aml/history?limit=1'),
    ]);
    const sd = await sr.json();
    const hd = await hr.json();
    hasData = sd.status === 'ok' && Object.values(sd.counts || {}).some(c => c > 0);
    hasHistory = hd.status === 'ok' && (hd.history || []).length > 0;
  } catch(e) {}
  const canEnter = (n) => {
    if (n <= 2) return true;
    if (n === 3) return hasData;
    if (n === 4) return hasHistory;
    return false;
  };
  const isDone = (n) => {
    if (n === 1) return hasData;
    if (n === 2) return hasData;
    if (n === 3) return hasHistory;
    if (n === 4) return hasHistory && localStorage.getItem('report_done') === '1';
    return false;
  };
  let html = '';
  steps.forEach((s, i) => {
    if (i > 0) html += `<span class="nav-connector${isDone(s.num) ? ' done' : ''}"></span>`;
    let cls, icon;
    if (s.num === step) { cls = 'active'; icon = '●'; }
    else if (canEnter(s.num)) { cls = isDone(s.num) ? 'done' : 'ready'; icon = isDone(s.num) ? '✓' : '○'; }
    else { cls = 'locked'; icon = '🔒'; }
    const tag = cls === 'locked' ? 'span' : 'a';
    const href = cls !== 'locked' ? ` href="${s.href}"` : '';
    html += `<${tag} class="nav-step ${cls}"${href}>${icon} ${s.label}</${tag}>`;
  });
  document.getElementById('navSteps').innerHTML = html;
}
renderNav(1);
// 页面加载时检查已有数据
(async function checkExisting() {
  try {
    const r = await fetch('/api/import/status');
    const d = await r.json();
    if (d.status === 'ok') {
      for (const [table, count] of Object.entries(d.counts)) {
        if (count > 0) {
          const card = document.querySelector(`[data-table="${table}"]`);
          if (card) {
            card.classList.add('done');
            document.getElementById(`result-${table}`).textContent = `已导入 ${count} 条 ✓`;
          }
        }
      }
      if (Object.values(d.counts).some(c => c > 0)) {
        document.getElementById('confirmBtn').disabled = false;
      }
    }
  } catch(e) {}
})();

const TABLES = ['customer', 'account', 'trans_record', 'product'];
const LABELS = { customer: '客户表', account: '账户表', trans_record: '交易表', product: '产品表' };
let uploadedFiles = {};  // { table: { valid_count, total_rows } }
let previewCache = {};   // { table: previewData } — 缓存每个表的预览
let activeTable = null;

async function handleFile(input, table) {
  const file = input.files[0];
  if (!file) return;
  const card = document.querySelector(`[data-table="${table}"]`);

  // 上传并预览
  const form = new FormData();
  form.append('file', file);
  const r = await fetch(`/api/import/upload?table=${table}`, { method: 'POST', body: form });
  const d = await r.json();

  if (d.status !== 'ok') { alert('上传失败: ' + (d.detail || '未知错误')); return; }

  const preview = d.preview;
  uploadedFiles[table] = { valid_count: preview.validation.valid_count, total_rows: preview.total_rows };
  previewCache[table] = preview;  // 缓存预览数据

  // 更新卡片状态
  updateCardStatus(table, preview);
  // 自动切换到刚上传的表
  showPreview(table);
  updateConfirmBtn();
  // 重置 input，允许重复上传同一文件
  input.value = '';
}

function updateCardStatus(table, preview) {
  const card = document.querySelector(`[data-table="${table}"]`);
  card.classList.remove('done', 'warn', 'error');
  if (preview.validation.error_count > 0) {
    card.classList.add('warn');
    document.getElementById(`result-${table}`).textContent =
      `共 ${preview.total_rows} 条，${preview.validation.error_count} 条校验警告 ⚡`;
  } else {
    card.classList.add('done');
    document.getElementById(`result-${table}`).textContent =
      `共 ${preview.total_rows} 条，校验通过 ✓`;
  }
}

// 点击卡片切换预览
function switchPreview(table) {
  if (previewCache[table]) {
    showPreview(table);
  }
}

function showPreview(table) {
  const preview = previewCache[table];
  if (!preview) return;

  activeTable = table;
  // 高亮当前卡片
  document.querySelectorAll('.upload-card').forEach(c => c.style.boxShadow = '');
  const card = document.querySelector(`[data-table="${table}"]`);
  if (card) card.style.boxShadow = '0 0 0 2px #4a90d9';

  const section = document.getElementById('previewSection');
  section.classList.add('show');
  document.getElementById('previewTitle').textContent =
    `第二步：预览并调整数据 — ${LABELS[table]} (前${preview.preview_rows.length}行 / 共${preview.total_rows}行)`;

  const stat = document.getElementById('previewStat');
  if (preview.validation.error_count > 0) {
    stat.className = 'pstat warn';
    stat.textContent = `⚠ ${preview.validation.error_count} 个校验警告`;
  } else {
    stat.className = 'pstat ok';
    stat.textContent = '✓ 全部通过';
  }

  // 错误列表
  const errDiv = document.getElementById('errorList');
  if (preview.validation.errors.length > 0) {
    errDiv.classList.add('show');
    errDiv.innerHTML = preview.validation.errors.map(e =>
      `<div class="error-item">第${e.row}行: ${e.errors.join('; ')}</div>`
    ).join('');
  } else {
    errDiv.classList.remove('show');
  }

  // 数据表格
  const thead = document.getElementById('previewTable');
  let html = '<thead><tr>';
  preview.columns.forEach(c => { html += `<th>${c}</th>`; });
  html += '</tr></thead><tbody>';

  preview.preview_rows.forEach((row, ri) => {
    html += '<tr>';
    preview.columns.forEach(c => {
      const val = row[c] || '';
      html += `<td title="${val}">${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  thead.innerHTML = html;
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirmBtn');
  const anyUploaded = Object.values(uploadedFiles).some(f => f.valid_count > 0);
  btn.disabled = !anyUploaded;
  btn.textContent = anyUploaded ? '✅ 确认导入' : '✅ 确认导入（请先上传文件）';
}

async function confirmImport() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = '⏳ 导入中...';

  const r = await fetch('/api/import/confirm', { method: 'POST' });
  const d = await r.json();

  if (d.status === 'ok') {
    showImportResult(d);
    uploadedFiles = {};
    renderNav(1);  // 刷新导航：导入完成后解锁后续步骤
    btn.textContent = `✅ 完成`;
    setTimeout(() => { btn.textContent = '✅ 确认导入'; btn.disabled = false; }, 3000);
  } else {
    alert('导入失败: ' + (d.detail || '未知错误'));
    btn.disabled = false; btn.textContent = '✅ 确认导入';
  }
}

function showImportResult(d) {
  const section = document.getElementById('importResultSection');
  section.style.display = 'block';

  let html = '';
  for (const [t, info] of Object.entries(d.tables)) {
    const hasErrors = info.import_errors && info.import_errors.length > 0;
    const color = hasErrors ? '#e74c3c' : '#52c41a';
    const icon = hasErrors ? '⚠' : '✓';

    html += `<div style="margin-bottom:12px;padding:12px 16px;border-left:3px solid ${color};background:#fafafa;border-radius:4px">`;
    html += `<b>${icon} ${info.label}</b>: `;
    html += `总计 ${info.total_rows} 条全部写入 ✓`;
    if (info.warnings > 0) html += `，<span style="color:#d48806">其中 ${info.warnings} 条数据有质量问题</span>`;
    if (hasErrors) {
      html += `，<span style="color:#e74c3c">${info.import_errors.length} 条SQL写入失败</span>`;
      html += '<div style="overflow-x:auto;margin-top:8px"><table class="preview-table"><thead><tr><th>行号</th>';
      const cols = Object.keys(info.import_errors[0].data);
      cols.forEach(c => { html += `<th>${c}</th>`; });
      html += '<th>错误</th></tr></thead><tbody>';
      info.import_errors.forEach(e => {
        html += '<tr>';
        html += `<td style="color:#e74c3c;font-weight:700">${e.row}</td>`;
        cols.forEach(c => {
          html += `<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem" title="${e.data[c]||''}">${e.data[c]||''}</td>`;
        });
        html += `<td style="color:#e74c3c;font-size:0.78rem">${e.error}</td>`;
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';
  }
  document.getElementById('importResultContent').innerHTML = html;
}

function showQuality(q) {
  const section = document.getElementById('qualitySection');
  section.classList.add('show');

  // 评分卡
  const dims = [
    {key:'completeness',label:'完整性',color:'#4a90e2'},
    {key:'accuracy',label:'准确性',color:'#e67e22'},
    {key:'consistency',label:'一致性',color:'#7b68ee'},
    {key:'logical',label:'逻辑性',color:'#2ecc71'},
  ];
  let html = '';
  dims.forEach(d => {
    const score = q.scores[d.key] || 0;
    const cls = score >= 90 ? '#52c41a' : score >= 70 ? '#faad14' : '#e74c3c';
    html += `<div class="score-card"><div class="slabel">${d.label}</div><div class="svalue" style="color:${cls}">${score}</div><div class="sbar"><div class="fill" style="width:${score}%;background:${cls}"></div></div></div>`;
  });
  // 综合评分
  const overall = q.scores.overall || 0;
  const ocls = overall >= 90 ? '#52c41a' : overall >= 70 ? '#faad14' : '#e74c3c';
  html += `<div class="score-card"><div class="slabel">综合评分</div><div class="svalue" style="color:${ocls};font-size:2.2rem">${overall}</div><div class="sbar"><div class="fill" style="width:${overall}%;background:${ocls}"></div></div></div>`;
  document.getElementById('scoreRow').innerHTML = html;

  // 问题列表
  const failed = q.rules.filter(r => r.status !== '通过');
  const rulesDiv = document.getElementById('qualityRules');
  if (failed.length > 0) {
    rulesDiv.innerHTML = '<h4 style="margin-top:16px;color:#e74c3c">⚠ 发现以下问题：</h4>' +
      failed.map(r => `<div style="padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:0.85rem"><span style="color:${r.severity==='高'?'#e74c3c':'#faad14'};font-weight:700">[${r.severity}]</span> ${r.description} — 影响 <b>${r.record_count}</b> 条</div>`).join('');
  } else {
    rulesDiv.innerHTML = '<div style="padding:12px 0;color:#52c41a;font-weight:600">✅ 所有检查项通过，数据质量良好</div>';
  }
}

async function clearData() {
  if (!confirm('确定要清空所有数据吗？此操作不可恢复。')) return;
  await fetch('/api/import/clear', { method: 'POST' });
  localStorage.removeItem('report_done');
  uploadedFiles = {};
  previewCache = {};
  document.querySelectorAll('.upload-card').forEach(c => c.classList.remove('done', 'warn', 'error'));
  TABLES.forEach(t => { document.getElementById(`result-${t}`).textContent = ''; });
  document.getElementById('previewSection').classList.remove('show');
  document.getElementById('qualitySection').classList.remove('show');
  document.getElementById('confirmBtn').disabled = true;
  renderNav(1);
  alert('数据已清空');
}

</script>
</body>
</html>
