<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反洗钱风险自评估</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 16px; height: 64px; }
.header a { color: #7eb8da; text-decoration: none; font-size: 0.85rem; }
.header h1 { font-size: 1.3rem; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* 工具栏 */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.btn { padding: 9px 22px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #1a1f3a; color: #fff; }
.btn-primary:hover { background: #2a3050; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.assess-meta { color: #999; font-size: 0.8rem; margin-left: 12px; }

/* 上部：综合评分 + 雷达图 两栏 */
.top-row { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 24px; }

/* 左侧综合评分 */
.overall-panel { background: #fff; border-radius: 10px; padding: 32px 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: center; }
.overall-panel .big-score { font-size: 5rem; font-weight: 700; line-height: 1; }
.overall-panel .big-level { font-size: 1.2rem; font-weight: 700; margin: 8px 0 16px; padding: 4px 20px; border-radius: 14px; display: inline-block; }
.overall-panel .big-bar { width: 80%; max-width: 220px; height: 8px; border-radius: 4px; background: #f0f0f0; margin: 0 auto 20px; overflow: hidden; }
.overall-panel .big-bar .fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
.overall-panel .meta-info { font-size: 0.8rem; color: #aaa; margin-top: 8px; }
.overall-panel .data-snippets { display: flex; justify-content: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
.overall-panel .data-snippet { text-align: center; }
.overall-panel .data-snippet .dsnum { font-size: 1.3rem; font-weight: 700; color: #555; }
.overall-panel .data-snippet .dslbl { font-size: 0.7rem; color: #bbb; }

.level-high { color: #e74c3c; }
.level-mid  { color: #faad14; }
.level-low  { color: #52c41a; }
.level-badge-high { background: #fff2f0; color: #e74c3c; border: 1px solid #ffa39e; }
.level-badge-mid  { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
.level-badge-low  { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.bar-high { background: #e74c3c; }
.bar-mid  { background: #faad14; }
.bar-low  { background: #52c41a; }

/* 雷达图 */
.radar-panel { background: #fff; border-radius: 10px; padding: 20px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.radar-panel h3 { font-size: 0.95rem; color: #333; margin-bottom: 4px; padding-left: 8px; }
#radarChart { width: 100%; height: 380px; }

/* 评估维度区 */
.dim-section { background: #fff; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
.dim-header { padding: 18px 24px; display: flex; align-items: center; gap: 16px; cursor: default; border-bottom: 1px solid #f5f5f5; }
.dim-header .dnum { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: #fff; flex-shrink: 0; }
.dim-header .dtitle { font-size: 1rem; font-weight: 600; flex: 1; }
.dim-header .dscore { text-align: right; }
.dim-header .dscore .dsval { font-size: 1.5rem; font-weight: 700; }
.dim-header .dscore .dslbl { font-size: 0.73rem; color: #999; }
.dim-header .dbar-wrap { width: 100px; height: 6px; border-radius: 3px; background: #f0f0f0; overflow: hidden; }
.dim-header .dbar-wrap .fill { height: 100%; border-radius: 3px; }

.dim-body { padding: 16px 24px 20px; }
.dim-body .dim-summary { font-size: 0.82rem; color: #999; margin-bottom: 12px; }
.assess-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.assess-table th { background: #fafafa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; font-size: 0.82rem; }
.assess-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
.assess-table tr:last-child td { border-bottom: none; }
.assess-table .arisk { font-weight: 700; font-size: 0.8rem; }

/* 建议区 */
.rec-panel { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.rec-panel h3 { font-size: 1rem; margin-bottom: 14px; }
.rec-list { list-style: none; }
.rec-list li { padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.88rem; display: flex; align-items: flex-start; gap: 10px; }
.rec-list li:last-child { border-bottom: none; }
.rec-list .rnum { color: #1a1f3a; font-weight: 700; min-width: 22px; }
.rec-list .rdim { font-size: 0.7rem; color: #999; background: #f5f5f5; padding: 2px 8px; border-radius: 8px; white-space: nowrap; margin-left: 6px; }

.loading { text-align: center; padding: 80px; color: #999; }
.error-msg { background: #fff1f0; border: 1px solid #ffa39e; border-radius: 6px; padding: 12px 16px; color: #cf1322; margin-bottom: 16px; display: none; }
.error-msg.show { display: block; }
.footer { text-align: center; padding: 30px; color: #bbb; font-size: 0.75rem; }

.color-cust { background: #4a90e2; } .bar-cust { background: #4a90e2; }
.color-prod { background: #e67e22; } .bar-prod { background: #e67e22; }
.color-chan { background: #7b68ee; } .bar-chan { background: #7b68ee; }
.color-geo  { background: #2ecc71; } .bar-geo  { background: #2ecc71; }
</style>
</head>
<body>

<div class="header">
  <a href="/products/">← 作品集</a>
  <h1>🔐 反洗钱风险自评估</h1>
  <span style="flex:1"></span>
  <a href="/report/" style="background:rgba(126,184,218,0.15);color:#7eb8da;text-decoration:none;font-size:1.05rem;padding:9px 22px;border-radius:8px;font-weight:600;border:1px solid rgba(126,184,218,0.3);white-space:nowrap" onmouseover="this.style.background='rgba(126,184,218,0.25)'" onmouseout="this.style.background='rgba(126,184,218,0.15)'">📄 报告生成 →</a>
</div>

<div class="container">
  <div class="error-msg" id="errorMsg"></div>

  <div class="toolbar">
    <button class="btn btn-primary" id="assessBtn" onclick="runAssess()">🔍 执行评估</button>
    <span class="assess-meta" id="assessMeta"></span>
  </div>

  <!-- 上部：综合评分 + 雷达图 -->
  <div class="top-row" id="topRow" style="display:none">
    <div class="overall-panel" id="overallPanel"></div>
    <div class="radar-panel">
      <h3>📡 四维风险雷达图</h3>
      <div id="radarChart"></div>
    </div>
  </div>

  <!-- 评估详情（四块） -->
  <div id="dimSections" style="display:none"></div>

  <!-- 整改建议 -->
  <div class="rec-panel" id="recPanel" style="display:none">
    <h3>🛡️ 整改建议</h3>
    <ul class="rec-list" id="recList"></ul>
  </div>
</div>

<div class="footer"><p>Python FastAPI · ECharts · AI-Assisted | © 2026 王亚慧</p></div>

<script>
const API = '/api/aml';
let radarInst = null;

async function runAssess() {
  const btn = document.getElementById('assessBtn');
  btn.disabled = true; btn.textContent = '⏳ 评估中...';
  document.getElementById('errorMsg').classList.remove('show');

  try {
    const r = await fetch(`${API}/assess`);
    const d = await r.json();
    if (d.status === 'error') { showError(d.message); return; }
    renderAll(d);
  } catch(e) { showError('评估请求失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '🔍 执行评估'; }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '❌ ' + msg; el.classList.add('show');
}

function levelClass(score) {
  return score <= 30 ? 'level-low' : score <= 60 ? 'level-mid' : 'level-high';
}
function barClass(score) {
  return score <= 30 ? 'bar-low' : score <= 60 ? 'bar-mid' : 'bar-high';
}
function levelName(score) {
  return score <= 30 ? '低风险' : score <= 60 ? '中风险' : '高风险';
}

function renderAll(d) {
  document.getElementById('assessMeta').textContent = `📅 ${d.assessment_time}`;

  const dims = d.dimensions;
  const dimKeys = ['customer','product','channel','geography'];
  const dimLabels = ['客户风险','产品/业务风险','渠道风险','地域风险'];
  const dimColors = ['color-cust','color-prod','color-chan','color-geo'];

  // ── 左侧：综合评分 ──
  const ocls = levelClass(d.overall_score);
  const obadge = ocls === 'level-low' ? 'level-badge-low' : ocls === 'level-mid' ? 'level-badge-mid' : 'level-badge-high';
  document.getElementById('overallPanel').innerHTML = `
    <div style="font-size:0.95rem;color:#333;margin-bottom:12px;font-weight:600">综合风险评分</div>
    <div class="big-score ${ocls}">${d.overall_score}</div>
    <div class="big-level ${obadge}">${d.risk_level_name}</div>
    <div class="big-bar"><div class="fill ${barClass(d.overall_score)}" style="width:${d.overall_score}%"></div></div>
    <div style="font-size:0.75rem;color:#bbb">${d.overall_score} / 100</div>
    <div class="meta-info">${d.assessment_time}</div>
    <div class="data-snippets">
      <div class="data-snippet"><div class="dsnum" style="color:#bbb">${d.data_summary.customers}</div><div class="dslbl">👤 客户</div></div>
      <div class="data-snippet"><div class="dsnum" style="color:#bbb">${d.data_summary.accounts}</div><div class="dslbl">💳 账户</div></div>
      <div class="data-snippet"><div class="dsnum" style="color:#bbb">${d.data_summary.transactions}</div><div class="dslbl">💸 交易</div></div>
      <div class="data-snippet"><div class="dsnum" style="color:#bbb">${d.data_summary.products}</div><div class="dslbl">📦 产品</div></div>
    </div>
  `;

  // ── 右侧：雷达图（轴上标注分数+等级）──
  document.getElementById('topRow').style.display = 'grid';
  const el = document.getElementById('radarChart');
  if (!radarInst) radarInst = echarts.init(el);

  const scoreColors = { '高': '#e74c3c', '高风险': '#e74c3c', '中': '#faad14', '中风险': '#faad14', '低': '#52c41a', '低风险': '#52c41a' };
  const dimScores = dimKeys.map(k => dims[k].score);
  const dimLevels = dimKeys.map(k => levelName(dims[k].score));

  radarInst.setOption({
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.name === '本次评估' && p.value) {
          let html = '<b>本次评估</b><br/>';
          dimKeys.forEach((k, i) => {
            html += `${dimLabels[i]}: <b>${p.value[i]}</b> ${dimLevels[i]}<br/>`;
          });
          return html;
        }
        return p.name + ': ' + p.value;
      }
    },
    radar: {
      center: ['50%', '52%'],
      radius: '55%',
      indicator: dimKeys.map((k, i) => ({
        name: dimLabels[i] + '\n' + dims[k].score + '分 ' + levelName(dims[k].score),
        max: 100,
      })),
      axisName: {
        color: '#333', fontSize: 14, fontWeight: 'bold',
        overflow: 'truncate', width: 90,
      },
      splitArea: { areaStyle: { color: ['#fff','#fafafa','#fff','#fafafa','#fff'] } },
    },
    series: [{
      type: 'radar',
      data: [{ value: dimScores, name: '本次评估',
               areaStyle: { color: 'rgba(250,173,20,0.15)' },
               lineStyle: { color: '#fa8c16', width: 2 } }],
      symbol: 'circle', symbolSize: 7,
      itemStyle: { color: '#fa8c16' },
    }],
  }, true);

  // 四块评估详情
  document.getElementById('dimSections').style.display = 'block';
  document.getElementById('dimSections').innerHTML = dimKeys.map((k, i) => {
    const dim = dims[k];
    return `
    <div class="dim-section">
      <div class="dim-header">
        <div class="dnum ${dimColors[i]}">${i+1}</div>
        <div class="dtitle">${dimLabels[i]}</div>
        <div class="dbar-wrap"><div class="fill ${barClass(dim.score)}" style="width:${dim.score}%"></div></div>
        <div class="dscore">
          <div class="dsval ${levelClass(dim.score)}">${dim.score}</div>
          <div class="dslbl">${levelName(dim.score)}</div>
        </div>
      </div>
      <div class="dim-body">
        <div class="dim-summary">${dim.summary}</div>
        <table class="assess-table">
          <thead><tr><th style="width:35%">评估项</th><th style="width:10%">风险</th><th style="width:25%">数据</th><th>说明</th></tr></thead>
          <tbody>
            ${dim.items.map(item => `
            <tr>
              <td><b>${item.name}</b></td>
              <td><span class="arisk ${levelClass(item.risk==='高'?85:item.risk==='中'?50:15)}">${item.risk}</span></td>
              <td style="font-size:0.82rem">${item.detail}</td>
              <td style="font-size:0.8rem;color:#888">${item.remark}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  // 整改建议
  document.getElementById('recPanel').style.display = 'block';
  document.getElementById('recList').innerHTML = d.recommendations.map((rec, i) => {
    // 尝试匹配建议来源维度
    let dimTag = '';
    for (const [dk, dim] of Object.entries(dims)) {
      if (dim.recommendations && dim.recommendations.includes(rec)) {
        const tagNames = {customer:'客户风险',product:'产品风险',channel:'渠道风险',geography:'地域风险'};
        dimTag = `<span class="rdim">${tagNames[dk]||dk}</span>`;
        break;
      }
    }
    return `<li><span class="rnum">${i+1}.</span><span>${rec}${dimTag}</span></li>`;
  }).join('');

  // 滚动到结果
}

// 页面加载后等待用户点击"执行评估"

</script>
</body>
</html>
